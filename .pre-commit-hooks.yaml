# Hook manifest: lets any repo consume these controls REMOTELY, pre-commit's native way —
#   - repo: https://github.com/pedro-angel/git-controls-starter
#     rev: vX.Y.Z        # pin the newest tag; the weekly autoupdate workflow bumps it via PR
#     hooks: [{id: check-no-tracked-secrets}, ...]
# instead of vendoring the scripts. Pinned rev = reproducible gate with a provenance
# trail; `pre-commit autoupdate` = freshness as a reviewable diff, not silent drift.
- id: check-no-tracked-secrets
  name: "no secret-looking file is tracked by git"
  entry: scripts/checks/check-no-tracked-secrets.sh
  language: script
  pass_filenames: false
- id: check-one-pin-per-action
  name: "every Action is SHA-pinned, one pin per action repo-wide"
  entry: scripts/checks/check-one-pin-per-action.sh
  language: script
  pass_filenames: false
- id: check-no-private-identifiers
  name: "no private identifier (hostname, internal name) enters the repo"
  entry: scripts/checks/check-no-private-identifiers.sh
  language: script
  pass_filenames: false
- id: check-commit-trailer
  name: "commit body carries a provenance trailer"
  entry: scripts/checks/check-commit-trailer.sh
  language: script
  stages: [commit-msg]
- id: check-evidence-trailer
  name: "live-surface commits carry an Evidence: trailer"
  entry: scripts/checks/check-evidence-trailer.sh
  language: script
  stages: [commit-msg]
  # opt-in: fails closed unless EVIDENCE_PATH_REGEX is configured — see the script header
- id: check-pin-comments-match
  name: "every pin's # comment still dereferences to its SHA (network; run at CI/manual stage)"
  entry: scripts/checks/check-pin-comments-match.sh
  language: script
  pass_filenames: false
  stages: [manual]
- id: check-diagrams-rendered
  name: "every mermaid fence rendered in the built docs (post-docs-build; run at CI/manual stage)"
  entry: scripts/checks/check-diagrams-rendered.sh
  language: script
  pass_filenames: false
  stages: [manual]
  # fail-closed: needs the built HTML present — invoke from your docs target, after the build
