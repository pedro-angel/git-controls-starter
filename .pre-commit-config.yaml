# .pre-commit-config.yaml — project-agnostic git-controls starter.
#
# Setup:
#   git init
#   pipx install pre-commit        # or: brew install pre-commit  |  brew install prek
#   pre-commit install --install-hooks
#
# CI re-runs THIS SAME FILE (.github/workflows/checks.yml), so local hooks and CI can't drift.
# `default_install_hook_types` is what makes a bare `install` also wire the commit-msg stage.

default_install_hook_types: [pre-commit, commit-msg]
minimum_pre_commit_version: "3.5.0"

repos:
  # ---- generic file hygiene -------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]   # keep markdown hard line breaks
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-yaml
      - id: detect-private-key
      # Team repo with a PR workflow? Uncomment to block direct commits to main:
      # - id: no-commit-to-branch
      #   args: [--branch, main]

  # ---- conventional-commit TYPE PREFIX (commit-msg stage) -------------------
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, docs, chore, refactor, test, build, ci, perf, style, revert]

  # ---- project invariants: POSIX sh, zero runtime deps ----------------------
  # These two are generic and useful in any repo. Add your own the same way —
  # a small script that asserts a contract no off-the-shelf linter knows about.
  - repo: local
    hooks:
      - id: check-no-tracked-secrets
        name: "no secret-looking file is tracked by git"
        language: script
        entry: scripts/checks/check-no-tracked-secrets.sh
        pass_filenames: false
      - id: check-one-pin-per-action
        name: "every Action is SHA-pinned, one pin per action repo-wide"
        language: script
        entry: scripts/checks/check-one-pin-per-action.sh
        pass_filenames: false
      - id: check-no-private-identifiers
        name: "no private identifier (hostname, internal name) enters the repo"
        language: script
        entry: scripts/checks/check-no-private-identifiers.sh
        pass_filenames: false
      # network check — CI / `pre-commit run --hook-stage manual`, never commit-time
      - id: check-pin-comments-match
        name: "every pin's # comment still dereferences to its SHA"
        language: script
        entry: scripts/checks/check-pin-comments-match.sh
        pass_filenames: false
        stages: [manual]
      - id: check-commit-trailer
        name: "commit body carries a provenance trailer"
        language: script
        entry: scripts/checks/check-commit-trailer.sh
        stages: [commit-msg]
      # OPT-IN: commits touching live-surface paths must carry an Evidence: trailer
      # (the machine check behind the README's Evidence convention). Configure
      # EVIDENCE_PATH_REGEX in the script first — it fails closed if you don't.
      # - id: check-evidence-trailer
      #   name: "live-surface commits carry an Evidence: trailer"
      #   language: script
      #   entry: scripts/checks/check-evidence-trailer.sh
      #   stages: [commit-msg]

  # ---- heavy security scanners: SAST + secrets, CI-only (manual stage) -------
  # "Keep heavy scanners in CI, not on a fresh clone" — both run at stages: [manual],
  # so `git commit` never triggers them and a fresh clone owes nothing. CI runs them
  # explicitly after the default-stage pass (see .github/workflows/checks.yml), the
  # same pattern the network-dependent check-pin-comments-match already uses.
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1                  # py wheel — bundles the shellcheck binary, needs no Docker
    hooks:
      - id: shellcheck
        args: [-s, sh]              # force POSIX sh (scripts are #!/bin/sh); catches real bugs no other hook sees
        stages: [manual]
  # Semgrep owns the surface shellcheck can't see: the CI/workflow config itself —
  # Action script-injection via ${{ github.event.* }} in run:, unpinned/mutable refs,
  # over-broad permissions, risky triggers. (shellcheck owns shell; gitleaks owns secrets.)
  # Runs TOKENLESS — no Semgrep account or token.
  - repo: https://github.com/semgrep/semgrep
    rev: v1.165.0
    hooks:
      - id: semgrep
        # Explicit rulesets + --error = fail-closed: semgrep with no --config scans nothing
        # and still exits 0 (green-against-nothing). --metrics=off keeps it hermetic; the
        # p/ registry rulesets are fetched at run time, so this is network-bound → manual/CI.
        args: [scan, --config, p/ci, --config, p/github-actions,
               --error, --metrics=off, --disable-version-check,
               --skip-unknown-extensions, --quiet]
        stages: [manual]
