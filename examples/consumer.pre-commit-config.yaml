# Consumer config: adopt the git-controls WITHOUT vendoring any script.
#   curl -fsSL https://raw.githubusercontent.com/pedro-angel/git-controls-starter/main/examples/consumer.pre-commit-config.yaml -o .pre-commit-config.yaml
# Then append your project's own linters/formatters at the bottom.
# The pre-commit-autoupdate workflow bumps every `rev` below via a weekly PR.

default_install_hook_types: [pre-commit, commit-msg] # bare `install` wires both stages
minimum_pre_commit_version: "3.5.0"

repos:
  # ---- generic file hygiene -------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-yaml
      - id: detect-private-key

  # ---- conventional-commit TYPE PREFIX (commit-msg stage) -------------------
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, docs, chore, refactor, test, build, ci, perf, style, revert]

  # ---- the invariants, consumed remotely at a pinned rev --------------------
  - repo: https://github.com/pedro-angel/git-controls-starter
    rev: v1.3.0
    hooks:
      - id: check-no-tracked-secrets
      - id: check-one-pin-per-action
      - id: check-no-private-identifiers
      - id: check-commit-trailer
      # manual stage upstream (needs network to dereference pins) — a rev bump alone
      # never runs it; invoke it explicitly in CI after your default-stage run:
      #   pre-commit run check-pin-comments-match --hook-stage manual --all-files
      - id: check-pin-comments-match
      # opt-in — configure EVIDENCE_PATH_REGEX first (fails closed if you don't):
      # - id: check-evidence-trailer
      # opt-in for repos with a Mermaid docs pipeline — manual stage, fails closed
      # without built HTML, so invoke it from your docs target AFTER the build:
      #   pre-commit run check-diagrams-rendered --hook-stage manual --all-files
      # defaults fit Sphinx+MyST; DIAGRAMS_* env vars override (see the script header)
      # - id: check-diagrams-rendered

  # ---- heavy security scanners: SAST + secrets, CI-only (manual stage) -------
  # Run these in CI after your default-stage pass, never on a fresh-clone commit:
  #   pre-commit run --hook-stage manual --all-files shellcheck semgrep
  # (For deep secret scanning, run the gitleaks BINARY in CI — the stock gitleaks
  #  pre-commit hook is --staged only, so on --all-files it scans nothing and goes
  #  green. See this starter's checks.yml for the fail-closed `gitleaks dir/git .` step.)
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        args: [-s, sh]        # drop this arg if your scripts are bash (#!/bin/bash), not POSIX sh
        stages: [manual]
  - repo: https://github.com/semgrep/semgrep
    rev: v1.169.0
    hooks:
      - id: semgrep
        # p/ci + p/github-actions = CI/workflow supply-chain rules. Add language packs for
        # YOUR code (e.g. p/python, p/javascript); shellcheck covers shell, gitleaks secrets.
        args: [scan, --config, p/ci, --config, p/github-actions,
               --error, --metrics=off, --disable-version-check,
               --skip-unknown-extensions, --quiet]
        stages: [manual]

  # ---- your project's linters/formatters below ------------------------------
