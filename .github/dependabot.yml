version: 2
updates:
  # Keep the SHA-pinned GitHub Actions fresh. Bot commits are exempted from the
  # provenance-trailer check in .github/workflows/checks.yml so these PRs pass CI.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    # Supply-chain cooldown: wait 7 days before proposing a newly published version, so a
    # compromised or yanked release has time to be caught upstream before it lands in a PR here.
    # SHA-pinning already stops a moved tag from changing what runs; this guards the bump itself.
    cooldown:
      default-days: 7
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
    # One grouped PR instead of one PR per action. Ungrouped weekly bumps pile up,
    # go stale against a moving main, and turn CONFLICTING — grouped, the whole
    # sweep lands as a single reviewable PR.
    groups:
      github-actions:
        patterns:
          - "*"
