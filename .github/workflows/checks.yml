name: checks

on:
  pull_request:
  push:
    branches: [main]

# Least privilege: these checks only read the repo — no write scope on GITHUB_TOKEN,
# which matters on a public repo where anyone can open a PR that triggers this workflow.
permissions:
  contents: read

# Cancel superseded runs on the same ref so a rapid push sequence doesn't pile up CI.
concurrency:
  group: checks-${{ github.ref }}
  cancel-in-progress: true

# Re-runs the IDENTICAL .pre-commit-config.yaml, so local hooks and CI cannot drift.
jobs:
  pre-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Actions pinned to full commit SHAs (tag in a comment) so a moved tag can't change
      # what runs. Dependabot (.github/dependabot.yml) proposes bumps.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0          # full history so the commit-msg range below works
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      # Installs pre-commit into the setup-python environment; later steps reuse it.
      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1
      # SAST lives at the manual stage (see .pre-commit-config.yaml) so it never burdens a
      # fresh-clone commit; the default run above skips it and these steps run it explicitly —
      # one config, still no local/CI drift. shellcheck reads the POSIX-sh scripts; Semgrep
      # reads the workflow YAML (Action injection, unpinned refs, over-broad permissions).
      - name: SAST — shellcheck (sh scripts)
        run: pre-commit run shellcheck --hook-stage manual --all-files --show-diff-on-failure
      - name: "SAST — Semgrep (workflow YAML: p/ci + p/github-actions)"
        run: pre-commit run semgrep --hook-stage manual --all-files --show-diff-on-failure
      # Deep secret scan. The stock gitleaks pre-commit hook is `--staged` only — on CI's
      # --all-files it would scan NOTHING and pass, the green-against-nothing trap this repo
      # forbids. So run the pinned MIT binary in full-history + working-tree mode, fail-closed
      # via --exit-code 1. checkout above uses fetch-depth: 0, so `gitleaks git .` sees it all.
      - name: deep secret scan — gitleaks (pinned, checksum-verified)
        run: |
          set -eu
          VER=8.30.1
          # Pin the BYTES, not just the version tag: this SHA-256 of the linux_x64 asset is the
          # binary equivalent of the 40-hex Action pins elsewhere — a re-uploaded or tampered asset
          # under the same tag fails here (fetching the release's own checksums.txt would not).
          # Bump VER + SHA256 together, and keep them in sync with security-scan.yml.
          SHA256=551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
          asset="gitleaks_${VER}_linux_x64.tar.gz"
          curl -fsSL -o "$asset" "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/${asset}"
          echo "${SHA256}  ${asset}" | sha256sum -c -
          tar -xzf "$asset" gitleaks
          ./gitleaks version
          ./gitleaks git . --redact --exit-code 1   # full commit history
          ./gitleaks dir . --redact --exit-code 1   # all working-tree file contents
      # Network-dependent invariant: pin comments must still dereference to their SHAs.
      # Runs here (not at commit time) because it does live tag lookups.
      - name: pin comments match their SHAs
        run: ./scripts/checks/check-pin-comments-match.sh
      # `--all-files` does not exercise commit-msg hooks, so lint each commit in the PR range.
      - name: commit-msg checks (PR range)
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          pre-commit --version
          # --no-merges: on pull_request events HEAD is GitHub's synthetic merge commit
          # ("Merge <sha> into <sha>"), which carries no conventional prefix or trailer —
          # without this every human PR fails the gate on a commit nobody authored.
          for sha in $(git rev-list --no-merges "$BASE_SHA"..HEAD); do
            # Skip bot commits (e.g. Dependabot): they carry a conventional prefix but no
            # provenance trailer, and are trusted, machine-generated changes.
            author_email=$(git log -1 --format=%ae "$sha")
            case "$author_email" in
              *"[bot]"*|*dependabot*) continue ;;
            esac
            git log -1 --format=%B "$sha" > /tmp/commit-msg
            pre-commit run --hook-stage commit-msg --commit-msg-filename /tmp/commit-msg --all-files
          done

  # PR-only supply-chain gate: fails the PR when it ADDS a dependency carrying a known
  # vulnerability or a denied license. GitHub's dependency graph tracks the Actions used in
  # .github/workflows, so a PR that bumps an action to a vulnerable version is in scope here —
  # but advisory coverage for Actions is thin, so this COMPLEMENTS, never replaces, the
  # SHA-pin + tag-deref checks that are this repo's primary Actions-integrity control.
  # Scoped to the PR diff: a green run means "no NEW bad deps in this PR", not "repo is clean".
  dependency-review:
    if: github.event_name == 'pull_request'   # the action can only diff a PR's base..head
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read        # least privilege; a PR comment would need pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: low         # fail-closed; raise to 'high' if low/moderate noise bites
          comment-summary-in-pr: never  # no PR comment → keeps the token at contents: read
