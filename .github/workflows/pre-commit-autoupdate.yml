# Weekly `pre-commit autoupdate` → PR. This starter's core artifact is a pre-commit
# config with pinned revs — and Dependabot has no pre-commit ecosystem, so without this
# workflow those pins are the one dependency surface with NO update automation.
# The PR's commits are authored by github-actions[bot], which checks.yml already skips
# in the commit-msg gate, so the automation isn't blocked by the trailer rule.
name: pre-commit autoupdate

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

permissions: {} # Deny all at workflow level; grant per-job below

jobs:
  autoupdate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pre-commit
      - run: pre-commit autoupdate
      # the shipped consumer example pins revs too (including this repo's own tag) —
      # keep it fresh by the same mechanism, or it rots the moment a tag ships
      - run: pre-commit autoupdate --config examples/consumer.pre-commit-config.yaml
      - uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: "ci(pre-commit): autoupdate hook versions"
          title: "ci(pre-commit): autoupdate hook versions"
          body: |
            Automated weekly `pre-commit autoupdate`. Review the rev bumps before merging —
            a hook bump can change what the gate enforces.
          branch: chore/pre-commit-autoupdate
          labels: dependencies
